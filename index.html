<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Login · Tessa</title>
  <style>
    /* RESET & GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
    }

    /* CARD UTAMA — MOBILE FIRST */
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 40px;
      box-shadow: 0 30px 50px rgba(0, 20, 30, 0.15), 0 8px 20px rgba(0, 40, 50, 0.1);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
    }

    /* HEADER */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #1a3b4e, #2b5c74);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .brand p {
      color: #467488;
      font-weight: 400;
      font-size: 0.95rem;
      background: rgba(70, 116, 136, 0.08);
      display: inline-block;
      padding: 6px 16px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }

    /* FORM GROUP */
    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1d4a5f;
      margin-bottom: 6px;
      margin-left: 8px;
      letter-spacing: 0.3px;
    }

    .input-field {
      width: 100%;
      padding: 18px 20px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid rgba(55, 95, 110, 0.15);
      border-radius: 28px;
      outline: none;
      transition: all 0.25s;
      color: #0b2d3a;
      font-weight: 450;
      -webkit-appearance: none;
      appearance: none;
    }

    .input-field:focus {
      border-color: #3d8faa;
      background: white;
      box-shadow: 0 4px 14px rgba(55, 145, 175, 0.25);
    }

    .input-field::placeholder {
      color: #9ab3c0;
      font-weight: 300;
      font-size: 0.95rem;
    }

    /* PESAN ERROR / PERINGATAN */
    .error-message {
      background: rgba(255, 100, 100, 0.15);
      color: #b13e3e;
      font-size: 0.9rem;
      padding: 12px 18px;
      border-radius: 40px;
      margin: 24px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(200, 70, 70, 0.25);
      font-weight: 460;
    }

    .error-message.hidden {
      display: none;
    }

    .error-icon {
      font-size: 1.2rem;
    }

    /* TOMBOL LOGIN */
    .login-btn {
      width: 100%;
      background: #195a70;
      border: none;
      padding: 18px 20px;
      border-radius: 40px;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 12px 18px -6px rgba(20, 80, 100, 0.4);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      -webkit-tap-highlight-color: transparent;
    }

    .login-btn:active {
      transform: scale(0.97);
      background: #104c60;
      box-shadow: 0 4px 12px rgba(20, 80, 100, 0.5);
    }

    /* HINT / KREDENSIAL DEMO */
    .demo-hint {
      margin-top: 32px;
      background: rgba(45, 105, 120, 0.06);
      border-radius: 32px;
      padding: 16px 18px;
      text-align: center;
      border: 1px dashed rgba(75, 130, 145, 0.3);
      font-size: 0.9rem;
      color: #1d5b70;
    }

    .demo-hint span {
      font-weight: 600;
      background: #ecf6fa;
      padding: 6px 12px;
      border-radius: 60px;
      margin: 0 4px;
      display: inline-block;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.3px;
    }

    .hint-label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    /* TINY ADAPTATION UNTUK LAYAR SANGAT KECIL */
    @media (max-width: 360px) {
      .login-card {
        padding: 24px 18px;
      }
      .brand h1 {
        font-size: 2.1rem;
      }
      .input-field {
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>🌿 tessa</h1>
      <p>masuk ke akun</p>
    </div>

    <!-- FORM LOGIN (tidak pakai submit agar JS handle) -->
    <div class="input-group">
      <label for="username">Nama pengguna</label>
      <input type="text" id="username" class="input-field" placeholder="masukkan nama"  autocomplete="off">
    </div>

    <div class="input-group">
      <label for="password">Kata sandi</label>
      <input type="password" id="password" class="input-field" placeholder="••••••••"  autocomplete="off">
    </div>

    <!-- Peringatan error (muncul jika salah) -->
    <div id="errorBox" class="error-message hidden">
      <span class="error-icon">⚠️</span>
      <span id="errorText">Password salah, coba lagi</span>
    </div>

    <button class="login-btn" id="loginButton">🔓 MASUK</button>

    <!-- hint / kredensial (tetap ditampilkan) -->
    <div class="demo-hint">
      <div class="hint-label">🔐 gunakan kredensial berikut</div>
      <div><span>tessa</span>  :  <span>tessa123</span></div>
      <div style="font-size:0.8rem; margin-top:8px; opacity:0.6;">password salah akan diminta ulang</div>
    </div>
  </div>

  <script>
    (function() {
      // Data login yang valid
      const VALID_USERNAME = "tessa";
      const VALID_PASSWORD = "tessa123";

      // Ambil elemen DOM
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginButton');
      const errorBox = document.getElementById('errorBox');
      const errorText = document.getElementById('errorText'); // optional kalau mau dinamis

      // helper untuk menampilkan error
      function showError(message) {
        errorText.innerText = message || 'Password salah, coba lagi';
        errorBox.classList.remove('hidden');
      }

      function hideError() {
        errorBox.classList.add('hidden');
      }

      // Fungsi untuk memproses login
      function attemptLogin() {
        // Ambil nilai input (trim spasi di username, biarkan password apa adanya)
        const username = usernameInput.value.trim();
        const password = passwordInput.value;   // password case-sensitive, spasi tidak ditrim (biasanya)

        // Reset error setiap percobaan (kecuali jika nanti salah kita tampilkan)
        hideError();

        // Validasi: cek nama dan password HARUS cocok persis
        if (username === VALID_USERNAME && password === VALID_PASSWORD) {
          // ✅ BENER — lanjut ke halaman mulai.html
          window.location.href = 'satu.html';
        } else {
          // ❌ SALAH — tampilkan error dan minta ulang
          showError('✗ Nama atau password salah. Ulangi.');
          // Kosongkan password agar user isi ulang (opsional — lebih baik fokus ke password)
          passwordInput.value = '';
          passwordInput.focus();  // mobile: keyboard muncul
        }
      }

      // Event listener tombol login
      loginBtn.addEventListener('click', function(e) {
        e.preventDefault();   // mencegah apapun (terutama jika di dalam form)
        attemptLogin();
      });

      // Biarkan user menekan "Enter" di kolom password untuk submit
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          attemptLogin();
        }
      });

      // Opsional: Enter di kolom username pindah ke password (perilaku alami)
      usernameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      // Sembunyikan error saat user mulai mengetik ulang (di kolom password)
      passwordInput.addEventListener('input', function() {
        hideError();
      });
      usernameInput.addEventListener('input', function() {
        hideError();
      });

      // Bonus kecil: jika ada fokus di password saat halaman dimuat, tidak menutup keyboard secara paksa.
      // Namun default value sudah terisi agar mudah testing.
      // Untuk mobile agar tidak terlalu "basah", kita tidak melakukan autofocus berlebihan.
      // Hanya fokus ke password setelah error seperti diatas.
    })();
  </script>

  <!-- catatan: file mulai.html harus ada di folder yang sama, 
       jika ingin test ganti window.location ke # atau alert dulu, 
       tapi sudah sesuai permintaan "lanjut ke halaman mulai.html" -->
</body>
</html>
